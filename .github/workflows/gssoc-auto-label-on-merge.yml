name: GSSoC — Auto Level Label on Merge

on:
  pull_request:
    types: [closed]

jobs:
  auto-label-level:
    name: Apply GSSoC Level Label on PR Merge
    runs-on: ubuntu-latest
    # Only run when the PR is actually merged (not just closed)
    if: github.event.pull_request.merged == true
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Ensure all GSSoC labels exist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            const labels = [
              // Difficulty
              { name: 'level:beginner',      color: '0075ca', description: 'GSSoC: Beginner level contribution (10 pts)' },
              { name: 'level:intermediate',  color: 'e4e669', description: 'GSSoC: Intermediate level contribution (25 pts)' },
              { name: 'level:advanced',      color: 'e11d48', description: 'GSSoC: Advanced level contribution (45 pts)' },
              { name: 'level:critical',      color: '7c3aed', description: 'GSSoC: Critical level contribution (60 pts)' },
              // Quality
              { name: 'quality:clean',       color: '22c55e', description: 'GSSoC: Clean, well-written code' },
              { name: 'quality:exceptional', color: 'f59e0b', description: 'GSSoC: Exceptional quality contribution (+bonus pts)' },
              // Type bonuses
              { name: 'type:docs',           color: '0ea5e9', description: 'GSSoC: Documentation contribution' },
              { name: 'type:testing',        color: '0ea5e9', description: 'GSSoC: Testing contribution' },
              { name: 'type:accessibility',  color: '0ea5e9', description: 'GSSoC: Accessibility improvement' },
              { name: 'type:performance',    color: '0ea5e9', description: 'GSSoC: Performance improvement' },
              { name: 'type:security',       color: '0ea5e9', description: 'GSSoC: Security contribution' },
              { name: 'type:design',         color: '0ea5e9', description: 'GSSoC: Design contribution' },
              { name: 'type:refactor',       color: '0ea5e9', description: 'GSSoC: Code refactoring' },
              { name: 'type:devops',         color: '0ea5e9', description: 'GSSoC: DevOps/CI/CD contribution' },
              { name: 'type:bug',            color: 'd73a4a', description: 'GSSoC: Bug fix' },
              { name: 'type:feature',        color: '84cc16', description: 'GSSoC: New feature' },
              // Validation
              { name: 'gssoc:approved',      color: '0e8a16', description: 'GSSoC: Approved and scored PR' },
              { name: 'gssoc:invalid',       color: 'ee0701', description: 'GSSoC: Invalid contribution' },
              { name: 'gssoc:spam',          color: 'ee0701', description: 'GSSoC: Spam contribution' },
              { name: 'gssoc:ai-slop',       color: 'b60205', description: 'GSSoC: AI-generated low-quality contribution' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...label });
                  console.log(`✅ Created label: ${label.name}`);
                }
              }
            }
            console.log('All GSSoC labels ensured.');

      - name: Auto-assign approved label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const { owner, repo } = context.repo;

            // Get current labels on the PR
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = currentLabels.map(l => l.name);

            // ─── Always apply gssoc:approved on valid merged PRs ─────────────────
            const spamLabels = ['gssoc:spam', 'gssoc:invalid', 'gssoc:ai-slop', 'do-not-merge'];
            const isSpam = spamLabels.some(l => labelNames.includes(l));

            if (!isSpam) {
              if (!labelNames.includes('gssoc:approved')) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber,
                  labels: ['gssoc:approved'],
                });
                console.log(`✅ Applied gssoc:approved to PR #${prNumber}`);
              }
            } else {
              console.log(`⚠️  PR #${prNumber} is spam/invalid — skipping gssoc:approved.`);
            }

      - name: Auto-assign level label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const { owner, repo } = context.repo;

            // Get current labels on the PR
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = currentLabels.map(l => l.name);

            // Avoid overriding if a level is already assigned
            const hasLevel = labelNames.some(l => l.startsWith('level:'));

            if (!hasLevel) {
              const additions = pr.additions || 0;
              const deletions = pr.deletions || 0;
              const totalChanges = additions + deletions;

              let levelLabel = '';
              if (totalChanges < 50) {
                levelLabel = 'level:beginner';
              } else if (totalChanges < 200) {
                levelLabel = 'level:intermediate';
              } else if (totalChanges < 500) {
                levelLabel = 'level:advanced';
              } else {
                levelLabel = 'level:critical';
              }

              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNumber,
                labels: [levelLabel],
              });
              console.log(`✅ Applied ${levelLabel} to PR #${prNumber} (Changes: ${totalChanges})`);
            } else {
              console.log(`PR #${prNumber} already has a level assigned.`);
            }

      - name: Add mentor attribution label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const { owner, repo } = context.repo;

            // Get the review(s) on this PR
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner, repo, pull_number: prNumber,
            });

            if (reviews.length === 0) {
              console.log(`No reviews found on PR #${prNumber}`);
              return;
            }

            // Pick the first approved/non-pending reviewer that is not the author
            const prAuthor = pr.user.login.toLowerCase();
            const reviewer = reviews.find(r =>
              r.user.login.toLowerCase() !== prAuthor && r.state !== 'PENDING'
            );

            if (!reviewer) {
              console.log('No eligible reviewer found for mentor attribution.');
              return;
            }

            const mentorUsername = reviewer.user.login;
            const mentorLabel = `mentor:${mentorUsername}`;
            const { owner: o, repo: r } = context.repo;

            // Ensure mentor label exists
            try {
              await github.rest.issues.getLabel({ owner: o, repo: r, name: mentorLabel });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: o, repo: r,
                  name: mentorLabel,
                  color: '6f42c1',
                  description: `GSSoC: Mentor attribution for @${mentorUsername}`,
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: o, repo: r,
              issue_number: prNumber,
              labels: [mentorLabel],
            });
            console.log(`🎓 Added mentor attribution: ${mentorLabel}`);
